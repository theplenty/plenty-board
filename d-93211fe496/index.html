<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#1f2a44" />
    <title>PLENTY CONVENTION · 마케팅 대시보드</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <script type="module" crossorigin src="./assets/index-CcJNScFH.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CERAtXNC.css">
  </head>
  <body>
    <div id="app">
      <div class="boot">대시보드 불러오는 중…</div>
    </div>
    <script>
      // 정적 파일(file:// 또는 빌드 안 된 상태)로 열면 위 module 스크립트가 실행되지 않아
      // '불러오는 중'에서 멈춘다. 2.5초 내 부팅 안 되면 어떻게 열어야 하는지 안내.
      setTimeout(function () {
        if (window.__appBooted) return;
        var a = document.getElementById("app");
        if (a)
          a.innerHTML =
            '<div class="boot">이 화면은 <b>정적 파일</b>로는 실행되지 않습니다.<br/>' +
            '터미널에서 <b>cd web &amp;&amp; npm run dev</b> 실행 후 <b>http://localhost:5173</b> 으로 열어주세요.<br/>' +
            '(배포본은 빌드된 <b>web/dist/</b> 를 웹서버로 서빙합니다.)</div>';
      }, 2500);
    </script>
  </body>
</html>
